<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Nexus Calendar — Coming Soon</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 30% 20%, #1e293b 0%, #0f172a 55%, #020617 100%);
      color: #e2e8f0;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 560px; }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #38bdf8;
      border: 1px solid rgba(56, 189, 248, 0.35);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 28px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.25rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 18px;
      background: linear-gradient(90deg, #e2e8f0, #38bdf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { font-size: 1.05rem; line-height: 1.6; color: #94a3b8; }
    .footer { margin-top: 40px; font-size: 0.8rem; color: #475569; }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Coming Soon</span>
    <h1>Nexus Calendar</h1>
    <p>Something is being built here. Check back soon.</p>
    <div class="footer">cal.stamih.com</div>
  </main>
</body>
</html>

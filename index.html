<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Nexus Calendar</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=p5-3">
  <script>
    (function () {
      var allowed = ['slate', 'sand', 'forest', 'plum'];
      var r = document.documentElement;
      r.dataset.mode = localStorage.getItem('nc_mode_v1') || 'dark';
      var t = localStorage.getItem('nc_theme_v1');
      r.dataset.theme = (allowed.indexOf(t) >= 0) ? t : 'slate';
    })();
  </script>
  <link rel="stylesheet" href="/assets/app.css?v=p5-3">
  <script src="/assets/vendor/rrule.min.js"></script>
  <script src="/assets/vendor/fullcalendar.global.min.js"></script>
  <script src="/assets/vendor/fullcalendar-rrule.global.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brand-today" role="button" tabindex="0" title="Go to today">
      <span class="brand-mark">N</span>
      <span class="brand-name">Nexus <strong>Calendar</strong></span>
    </div>
    <nav class="actions">
      <div class="theme-ctl">
        <button id="mode-toggle" class="icon-btn" title="Toggle light / dark" aria-label="Toggle light or dark mode">◐</button>
        <select id="theme-select" class="theme-select" title="Color theme" aria-label="Color theme">
          <option value="slate">Slate</option>
          <option value="sand">Sand</option>
          <option value="forest">Forest</option>
          <option value="plum">Plum</option>
        </select>
      </div>
      <div id="auth" class="auth"><span class="muted">…</span></div>
    </nav>
  </header>

  <div class="app">
    <aside class="sidebar">
      <h2 class="sidebar-title">Calendars</h2>
      <div id="calendar-list" class="cal-list"><p class="muted small">Loading…</p></div>
      <div id="user-tools" class="user-tools" hidden>
        <button class="btn small" id="new-event-btn" type="button">＋ New event</button>
        <button class="btn small" id="new-cal-btn" type="button">＋ New calendar</button>
      </div>
    </aside>

    <div class="sidebar-resizer" id="sidebar-resizer" title="Drag to resize"></div>

    <main class="calendar-wrap">
      <div id="calendar"></div>
    </main>
  </div>

  <div id="event-modal" class="modal" hidden>
    <div class="modal-card">
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      <h3 id="modal-title"></h3>
      <p id="modal-cal" class="muted small"></p>
      <p id="modal-when"></p>
      <p id="modal-where" class="muted"></p>
      <p id="modal-desc" class="muted small"></p>
      <span class="modal-fade-icon" id="modal-icon" aria-hidden="true"></span>
      <div class="modal-actions" id="modal-actions" hidden>
        <span class="spacer"></span>
        <button class="btn small danger" id="modal-delete" type="button">Delete</button>
        <button class="btn primary small" id="modal-edit" type="button">Edit</button>
      </div>
    </div>
  </div>

  <div id="event-editor" class="modal" hidden>
    <div class="modal-card">
      <button class="modal-close" id="ee-close" aria-label="Close">×</button>
      <h3 id="ee-heading">New event</h3>
      <form id="ee-form" class="form">
        <label>Title<input type="text" id="ee-title-input" required></label>
        <div class="field-pair">
          <label class="cal-field">Calendar<select id="ee-cal"></select></label>
          <label class="icon-field">Icon
            <button type="button" class="icon-pick-btn empty" id="ee-icon-btn" title="Choose an icon" aria-label="Choose an icon">＋</button>
            <input type="hidden" id="ee-icon">
          </label>
        </div>
        <div class="emoji-pop" id="ee-emoji-pop" hidden>
          <input type="text" class="emoji-search" id="ee-emoji-search" placeholder="Search emojis…" autocomplete="off">
          <div class="emoji-grid" id="ee-emoji-grid"></div>
        </div>
        <label class="checkbox"><input type="checkbox" id="ee-allday"> All day</label>
        <div id="ee-timed" class="field-pair">
          <label>Starts<input type="datetime-local" id="ee-start"></label>
          <label>Ends<input type="datetime-local" id="ee-end"></label>
        </div>
        <div id="ee-allday-fields" class="field-pair" hidden>
          <label>Starts<input type="date" id="ee-start-date"></label>
          <label>Ends<input type="date" id="ee-end-date"></label>
        </div>
        <label>Repeat
          <select id="ee-freq">
            <option value="">Does not repeat</option>
            <option value="DAILY">Daily</option>
            <option value="WEEKLY">Weekly</option>
            <option value="MONTHLY">Monthly</option>
            <option value="YEARLY">Yearly</option>
          </select>
        </label>
        <div id="ee-recur-opts" hidden>
          <div class="recur-line">
            <span class="recur-label">Every</span>
            <input type="number" id="ee-interval" min="1" max="999" value="1">
            <span id="ee-interval-unit" class="unit">days</span>
          </div>
          <div id="ee-byday" class="weekday-row" hidden>
            <button type="button" data-d="MO">M</button>
            <button type="button" data-d="TU">T</button>
            <button type="button" data-d="WE">W</button>
            <button type="button" data-d="TH">T</button>
            <button type="button" data-d="FR">F</button>
            <button type="button" data-d="SA">S</button>
            <button type="button" data-d="SU">S</button>
          </div>
          <div id="ee-monthly" class="recur-line" hidden>
            <span class="recur-label">On</span>
            <select id="ee-monthly-mode"></select>
          </div>
          <div class="recur-line">
            <span class="recur-label">Ends</span>
            <select id="ee-end-type">
              <option value="never">Never</option>
              <option value="count">After</option>
              <option value="until">On date</option>
            </select>
            <input type="number" id="ee-count" min="1" max="999" value="10" hidden>
            <span id="ee-count-unit" class="unit" hidden>times</span>
            <input type="date" id="ee-until" hidden>
          </div>
        </div>
        <label>Location<input type="text" id="ee-location"></label>
        <label>Description<textarea id="ee-desc" rows="3"></textarea></label>
        <p class="form-error small" id="ee-error" hidden></p>
        <div class="modal-actions">
          <button type="button" class="btn small danger" id="ee-delete" hidden>Delete</button>
          <span class="spacer"></span>
          <button type="button" class="btn small" id="ee-cancel">Cancel</button>
          <button type="submit" class="btn primary small">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="cal-editor" class="modal" hidden>
    <div class="modal-card">
      <button class="modal-close" id="ce-close" aria-label="Close">×</button>
      <h3 id="ce-heading">New calendar</h3>
      <form id="ce-form" class="form">
        <label>Name<input type="text" id="ce-name" required></label>
        <div class="field-pair">
          <label>Color<input type="color" id="ce-color" value="#5b9dd9"></label>
          <label>Icon
            <button type="button" class="icon-pick-btn" id="ce-icon-btn" title="Choose an icon" aria-label="Choose an icon">📅</button>
            <input type="hidden" id="ce-icon">
          </label>
        </div>
        <div class="emoji-pop" id="ce-emoji-pop" hidden>
          <input type="text" class="emoji-search" id="ce-emoji-search" placeholder="Search emojis…" autocomplete="off">
          <div class="emoji-grid" id="ce-emoji-grid"></div>
        </div>
        <p class="form-error small" id="ce-error" hidden></p>
        <div class="modal-actions">
          <button type="button" class="btn small danger" id="ce-delete" hidden>Delete</button>
          <span class="spacer"></span>
          <button type="button" class="btn small" id="ce-cancel">Cancel</button>
          <button type="submit" class="btn primary small">Save</button>
        </div>
      </form>
      <div id="ce-share" class="share-section" hidden>
        <h4>Sharing</h4>
        <div id="ce-share-list" class="share-list"></div>
        <form id="ce-share-form" class="share-add">
          <input type="email" id="ce-share-email" placeholder="email@example.com" required>
          <select id="ce-share-role">
            <option value="viewer">Viewer</option>
            <option value="editor">Editor</option>
          </select>
          <button type="submit" class="btn small">Add</button>
        </form>
        <p class="form-error small" id="ce-share-error" hidden></p>
      </div>
    </div>
  </div>

  <div class="app-version" id="app-version"></div>

  <script src="/assets/app.js?v=p5-3"></script>
</body>
</html>

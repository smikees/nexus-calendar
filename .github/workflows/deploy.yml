name: Deploy to cal.stamih.com via FTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # The FTP account 'cal_admin' lands in public_html/cal.stamih.com/cal_admin,
          # which is one level below the actual document root. '../' climbs up into
          # public_html/cal.stamih.com/ (the doc root Apache serves).
          server-dir: ../
          # Don't upload repo/CI metadata or local-only files, and never touch
          # serv